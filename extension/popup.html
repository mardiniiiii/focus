<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Chat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 440px;
      height: 580px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      padding: 11px 14px;
      background: #181825;
      border-bottom: 1px solid #313244;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .header-icon {
      width: 26px;
      height: 26px;
      background: #313244;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .header-name {
      font-size: 14px;
      font-weight: 600;
      color: #cdd6f4;
      letter-spacing: -0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .model-picker {
      position: relative;
    }

    .model-badge {
      font-size: 10px;
      padding: 2px 8px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 10px;
      color: #9399b2;
      font-family: ui-monospace, monospace;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .model-badge:hover {
      background: #45475a;
      color: #cdd6f4;
    }

    .model-badge::after {
      content: ' ▾';
      font-size: 9px;
      opacity: 0.7;
    }

    .model-dropdown {
      display: none;
      flex-direction: column;
      position: absolute;
      right: 0;
      top: calc(100% + 5px);
      background: #181825;
      border: 1px solid #313244;
      border-radius: 8px;
      min-width: 180px;
      max-height: 435px; /* 75% of 580px popup height */
      z-index: 100;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
    }

    .model-dropdown.open {
      display: flex;
    }

    #modelFilter {
      padding: 7px 10px;
      font-size: 11px;
      font-family: ui-monospace, monospace;
      border: none;
      border-bottom: 1px solid #313244;
      background: #13131f;
      color: #cdd6f4;
      outline: none;
      flex-shrink: 0;
      width: 100%;
    }

    #modelFilter::placeholder { color: #45475a; }

    #modelList {
      overflow-y: auto;
      flex: 1;
    }

    #modelList::-webkit-scrollbar { width: 4px; }
    #modelList::-webkit-scrollbar-track { background: transparent; }
    #modelList::-webkit-scrollbar-thumb {
      background: #313244;
      border-radius: 2px;
    }

    .model-option {
      padding: 7px 12px;
      font-size: 11px;
      font-family: ui-monospace, monospace;
      color: #9399b2;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .model-option:hover {
      background: #313244;
      color: #cdd6f4;
    }

    .model-option.active {
      color: #cba6f7;
    }

    .model-check {
      opacity: 0;
      font-size: 10px;
    }

    .model-option.active .model-check {
      opacity: 1;
    }

    #schoolworkBtn, #refreshBtn {
      background: none;
      border: none;
      color: #6c7086;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    #schoolworkBtn:hover, #refreshBtn:hover {
      color: #cdd6f4;
      background: #313244;
    }

    #schoolworkBtn.checking {
      color: #cba6f7;
      background: #313244;
    }

    #schoolworkBtn.checking svg {
      animation: sw-spin 1.2s linear infinite;
    }

    @keyframes sw-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Status bar ──────────────────────────────────── */
    #status {
      font-size: 11px;
      padding: 4px 14px;
      background: #13131f;
      color: #585b70;
      border-bottom: 1px solid #1e1e2e;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 22px;
    }

    /* ── Chat area ───────────────────────────────────── */
    #chatArea {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #chatArea::-webkit-scrollbar { width: 4px; }
    #chatArea::-webkit-scrollbar-track { background: transparent; }
    #chatArea::-webkit-scrollbar-thumb {
      background: #313244;
      border-radius: 2px;
    }

    /* ── Welcome state ───────────────────────────────── */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      color: #6c7086;
      text-align: center;
      padding: 32px 24px;
      pointer-events: none;
    }

    .welcome-icon {
      font-size: 36px;
      opacity: 0.55;
      margin-bottom: 4px;
    }

    .welcome-title {
      font-size: 15px;
      font-weight: 600;
      color: #9399b2;
    }

    .welcome-sub {
      font-size: 12px;
      line-height: 1.65;
      color: #585b70;
      max-width: 240px;
    }

    /* ── Message bubbles ─────────────────────────────── */
    .message {
      display: flex;
      max-width: 88%;
    }

    .message.user  { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .bubble {
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.55;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #7287fd;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #2a2a3e;
      color: #cdd6f4;
      border-bottom-left-radius: 4px;
      white-space: pre-wrap;
    }

    /* ── Tool call marker ────────────────────────────── */
    .message.tool-call-wrap { margin-block: -2px; }

    .tool-call { font-size: 12px; }

    .tool-call summary {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 7px;
      border-radius: 6px;
      cursor: pointer;
      user-select: none;
      color: #6c7086;
      list-style: none;
      transition: background 0.12s, color 0.12s;
    }

    .tool-call summary:hover { background: #313244; color: #9399b2; }
    .tool-call summary::-webkit-details-marker { display: none; }

    .tool-call-icon { font-size: 10px; opacity: 0.7; }

    .tool-call-name {
      font-family: ui-monospace, monospace;
      font-size: 11px;
    }

    .tool-call-chevron { font-size: 10px; opacity: 0.55; }
    .tool-call-chevron::before { content: '›'; }
    .tool-call[open] .tool-call-chevron::before { content: '˅'; }

    .tool-call-body {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 5px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 280px;
    }

    .tool-call-section { display: flex; flex-direction: column; gap: 3px; }

    .tool-call-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6c7086;
    }

    .tool-call-value {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: #a6e3a1;
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 120px;
      overflow-y: auto;
    }

    .tool-call-value.input { color: #89dceb; }

    /* ── Typing indicator ────────────────────────────── */
    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 11px 16px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: #585b70;
      border-radius: 50%;
      animation: bounce 1.3s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0);    opacity: 0.4; }
      40%            { transform: translateY(-5px); opacity: 1;   }
    }

    /* ── Input area ──────────────────────────────────── */
    .input-area {
      padding: 10px 12px;
      background: #181825;
      border-top: 1px solid #313244;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #userInput {
      flex: 1;
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
      border: 1px solid #45475a;
      border-radius: 12px;
      background: #2a2a3e;
      color: #cdd6f4;
      resize: none;
      min-height: 37px;
      max-height: 110px;
      line-height: 1.45;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #userInput:focus {
      outline: none;
      border-color: #7287fd;
    }

    #userInput::placeholder { color: #585b70; }

    #sendBtn {
      width: 37px;
      height: 37px;
      border: none;
      border-radius: 11px;
      background: #7287fd;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #sendBtn:hover:not(:disabled) {
      background: #89b4fa;
      transform: scale(1.05);
    }

    #sendBtn:disabled {
      background: #313244;
      color: #585b70;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Settings button (matches refreshBtn style) ───── */
    #settingsBtn {
      background: none;
      border: none;
      color: #6c7086;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    #settingsBtn:hover, #settingsBtn.active {
      color: #cdd6f4;
      background: #313244;
    }

    /* ── Settings panel ──────────────────────────────── */
    #settingsPanel {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow-y: auto;
    }

    #settingsPanel::-webkit-scrollbar { width: 4px; }
    #settingsPanel::-webkit-scrollbar-track { background: transparent; }
    #settingsPanel::-webkit-scrollbar-thumb {
      background: #313244;
      border-radius: 2px;
    }

    .settings-panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    .settings-back-btn {
      background: none;
      border: none;
      color: #6c7086;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .settings-back-btn:hover {
      color: #cdd6f4;
      background: #313244;
    }

    .settings-title {
      font-size: 13px;
      font-weight: 600;
      color: #cdd6f4;
    }

    .settings-fields {
      flex: 1;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .settings-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .settings-label {
      font-size: 11px;
      font-weight: 600;
      color: #9399b2;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .settings-input {
      font-family: inherit;
      font-size: 13px;
      padding: 8px 11px;
      border: 1px solid #45475a;
      border-radius: 10px;
      background: #2a2a3e;
      color: #cdd6f4;
      outline: none;
      transition: border-color 0.15s;
    }

    .settings-input:focus {
      border-color: #7287fd;
    }

    .settings-input::placeholder { color: #585b70; }

    .settings-textarea {
      font-family: inherit;
      font-size: 12px;
      padding: 8px 11px;
      border: 1px solid #45475a;
      border-radius: 10px;
      background: #2a2a3e;
      color: #cdd6f4;
      outline: none;
      resize: vertical;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    .settings-textarea:focus { border-color: #7287fd; }
    .settings-textarea::placeholder { color: #585b70; }

    .settings-save-btn {
      margin: 0 14px 16px;
      padding: 9px;
      border: none;
      border-radius: 11px;
      background: #7287fd;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .settings-save-btn:hover { background: #89b4fa; }
    .settings-save-btn.saved { background: #a6e3a1; color: #1e1e2e; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="header-icon"><img id="favicon" width="16" height="16" style="border-radius:3px;display:block;" /></div>
      <span class="header-name">Page Chat</span>
    </div>
    <div class="header-right">
      <div class="model-picker" id="modelPicker">
        <button class="model-badge" id="modelBadge">connecting…</button>
        <div class="model-dropdown" id="modelDropdown">
          <input id="modelFilter" type="text" placeholder="Filter models…" autocomplete="off" />
          <div id="modelList"></div>
        </div>
      </div>
      <button id="schoolworkBtn" title="Is this schoolwork?">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zm-7 9.17V16c0 1.1 3.13 2 7 2s7-.9 7-2v-3.83L12 17l-7-4.83z"/>
        </svg>
      </button>
      <button id="refreshBtn" title="Re-read current page">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13.65 2.35A7.958 7.958 0 0 0 8 0C3.58 0 0 3.58 0 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 8 14c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35z" fill="currentColor"/>
        </svg>
      </button>
      <button id="settingsBtn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="status">Send a message to chat about this page</div>

  <div id="chatArea">
    <div id="welcome">
      <div class="welcome-icon">🌐</div>
      <div class="welcome-title">Chat with any page</div>
      <div class="welcome-sub">Type a question and I'll read the page automatically to answer it.</div>
    </div>
  </div>

  <div id="settingsPanel"></div>

  <div class="input-area">
    <textarea id="userInput" placeholder="Ask about this page…" rows="1"></textarea>
    <button id="sendBtn" title="Send (Enter)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1.5 1.5L14.5 8L1.5 14.5V9.5L10.5 8L1.5 6.5V1.5Z" fill="currentColor"/>
      </svg>
    </button>
  </div>

  <script src="turndown.js"></script>
  <script src="mcp.js"></script>
  <script src="popup.js"></script>
</body>
</html>
