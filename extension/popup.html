<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page HTML Reader</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 600px;
      height: 520px;
      font-family: monospace;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 14px;
      background: #181825;
      border-bottom: 1px solid #313244;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }

    header span {
      font-size: 13px;
      font-weight: bold;
      color: #cba6f7;
    }

    .actions {
      display: flex;
      gap: 6px;
    }

    button {
      font-family: monospace;
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid #45475a;
      border-radius: 4px;
      background: #313244;
      color: #cdd6f4;
      cursor: pointer;
    }

    button:hover {
      background: #45475a;
    }

    /* Tab bar */
    .tabs {
      display: flex;
      background: #181825;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    .tab {
      font-family: monospace;
      font-size: 12px;
      padding: 6px 18px;
      border: none;
      border-right: 1px solid #313244;
      border-radius: 0;
      background: transparent;
      color: #6c7086;
      cursor: pointer;
      letter-spacing: 0.03em;
    }

    .tab:hover {
      background: #1e1e2e;
      color: #cdd6f4;
    }

    .tab.active {
      background: #1e1e2e;
      color: #cba6f7;
      border-bottom: 2px solid #cba6f7;
    }

    #status {
      font-size: 11px;
      padding: 4px 14px;
      background: #181825;
      color: #6c7086;
      border-bottom: 1px solid #313244;
      min-height: 22px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Output panels */
    .panel {
      display: none;
      flex: 1;
      overflow: auto;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.5;
    }

    .panel.active {
      display: block;
    }

    #htmlPanel {
      white-space: pre;
      color: #a6e3a1;
    }

    #markdownPanel {
      white-space: pre-wrap;
      color: #89dceb;
    }

    .panel.empty {
      color: #6c7086;
      white-space: normal;
      font-style: italic;
    }
  </style>
</head>
<body>
  <header>
    <span>Page HTML Reader</span>
    <div class="actions">
      <button id="readBtn">Read Page</button>
      <button id="copyBtn">Copy</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="html">HTML</button>
    <button class="tab" data-tab="markdown">Markdown</button>
  </div>

  <div id="status">Click "Read Page" to fetch the current page's source.</div>

  <div id="htmlPanel" class="panel active empty">No HTML loaded yet.</div>
  <div id="markdownPanel" class="panel empty">No markdown converted yet.</div>

  <script src="turndown.js"></script>
  <script src="popup.js"></script>
</body>
</html>
